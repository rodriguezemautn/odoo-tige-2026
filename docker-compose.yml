# ============================================================
# Odoo 19 Community — Workshop Docker Compose
# Optimizado para despliegue con Rocky Linux + MikroTik
# Tested: Docker 24+, Docker Compose v2, Rocky Linux 9+/Ubuntu 22.04+
# ============================================================

name: odoo-workshop

networks:
  workshop_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  odoo_data:
    driver: local
  odoo_addons:
    driver: local
  postgres_data:
    driver: local
  nginx_logs:
    driver: local

services:

  # ──────────────────────────────────────────────
  # PostgreSQL 16 — Base de Datos
  # ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: odoo_workshop_db
    restart: unless-stopped
    networks:
      - workshop_net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odoo_workshop}
      POSTGRES_USER: ${POSTGRES_USER:-odoo_workshop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=16MB
        -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo_workshop_user} -d ${POSTGRES_DB:-odoo_workshop}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    shm_size: 256m
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ──────────────────────────────────────────────
  # Odoo 19 Community — Aplicación
  # ──────────────────────────────────────────────
  odoo:
    image: odoo:19.0
    container_name: odoo_workshop_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - workshop_net
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo_workshop_user}
      PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:8069:8069"    # Solo acceso local — Nginx hace el proxy
      - "127.0.0.1:8072:8072"    # WebSocket / longpolling
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./odoo/extra-addons:/mnt/extra-addons:rw
    command: ["odoo", "--config=/etc/odoo/odoo.conf"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ──────────────────────────────────────────────
  # Nginx — Reverse Proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: odoo_workshop_nginx
    restart: unless-stopped
    depends_on:
      odoo:
        condition: service_healthy
    networks:
      - workshop_net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/odoo.conf:/etc/nginx/conf.d/odoo.conf:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ──────────────────────────────────────────────
  # pgAdmin (Opcional — solo para el docente)
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: odoo_workshop_pgadmin
    restart: unless-stopped
    profiles:
      - tools    # Solo se levanta con: docker compose --profile tools up -d
    networks:
      - workshop_net
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@workshop.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_workshop_2026
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - ./pgadmin:/var/lib/pgadmin:rw
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

[options]

; ── Conexión a base de datos ──────────────────────────────
; GENERATED BY setup.sh — NO EDITAR DIRECTAMENTE
db_host = db
db_port = 5432
db_name = __POSTGRES_DB__
db_user = __POSTGRES_USER__
db_password = __POSTGRES_PASSWORD__
db_maxconn = 64
db_sslmode = prefer

; ── Rutas ────────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; ── Seguridad ────────────────────────────────────────────
admin_passwd = __ODOO_MASTER_PASSWORD__
list_db = True

; ── Workers ──────────────────────────────────────────────
; Fórmula: workers = (vCPU × 2) + 1
; Ajustar según el servidor:
;   4 vCPU → workers = 9
;   8 vCPU → workers = 17
workers = 9
max_cron_threads = 2

; ── Límites de memoria por worker ─────────────────────────
limit_memory_hard = 2684354560   ; 2.5 GB
limit_memory_soft = 2147483648   ; 2 GB
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
limit_time_real_cron = 600

; ── Longpolling (WebSocket) ───────────────────────────────
longpolling_port = 8072
gevent_port = 8072

; ── Logging ──────────────────────────────────────────────
log_level = warn
log_handler = werkzeug:CRITICAL
logfile = /var/lib/odoo/odoo.log
logrotate = True

; ── Performance ──────────────────────────────────────────
proxy_mode = True
without_demo = False
server_wide_modules = base,web

; ── Internacionalización ─────────────────────────────────
; Configurar en UI post-instalación:
; lang = es_AR
; currency = ARS

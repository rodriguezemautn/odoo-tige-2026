[options]

; ── Conexión a base de datos ──────────────────────────────
; GENERATED BY setup.sh — NO EDITAR DIRECTAMENTE
db_host = db
db_port = 5432
db_name = odoo_workshop
db_user = odoo_workshop_user
db_password = 0d00_w0rksh0p_2026!
db_maxconn = 64
db_sslmode = prefer

; ── Rutas ────────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; ── Seguridad ────────────────────────────────────────────
admin_passwd = 0d00_m4st3r_2026!
list_db = True

; ── Workers ──────────────────────────────────────────────
; Fórmula: workers = (vCPU × 2) + 1
; Ajustar según el servidor:
;   4 vCPU → workers = 9
;   8 vCPU → workers = 17
workers = 9
max_cron_threads = 2

; ── Límites de memoria por worker ─────────────────────────
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120
limit_time_real_cron = 600

; ── Longpolling (WebSocket) ───────────────────────────────
longpolling_port = 8072
gevent_port = 8072

; ── Logging ──────────────────────────────────────────────
log_level = warn
log_handler = werkzeug:CRITICAL
logfile = /var/lib/odoo/odoo.log
logrotate = True

; ── Performance ──────────────────────────────────────────
proxy_mode = True
without_demo = False
server_wide_modules = base,web

; ── Internacionalización ─────────────────────────────────
; Configurar en UI post-instalación:
; lang = es_AR
; currency = ARS

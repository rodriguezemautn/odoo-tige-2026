# ── Servidor principal Odoo ────────────────────────────
server {
    listen 80;
    # listen 443 ssl;  # Descomentar para HTTPS
    server_name odoo.workshop.local _;

    # SSL (descomentar para HTTPS con certbot / letsencrypt)
    # ssl_certificate     /etc/nginx/certs/workshop.crt;
    # ssl_certificate_key /etc/nginx/certs/workshop.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Cabeceras de proxy
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;

    # Timeouts generosos para el workshop
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── WebSocket / Longpolling ─────────────────────────
    location /websocket {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /longpolling/ {
        proxy_pass http://odoo_longpolling;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Archivos estáticos — cache agresivo ────────────
    location ~* /web/static/ {
        proxy_cache_valid 200 90d;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
    }

    # ── Aplicación principal ────────────────────────────
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
        proxy_buffering off;   # Streaming de respuestas
    }
}
